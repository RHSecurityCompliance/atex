name: Deploy documentation to GH Pages

on:
  push:
    branches: [main, devel]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Post-process .md and __init__.py files
        run: ./.github/scripts/pdoc/post_process_repo.sh

      # also install '.' to get all dependencies from pip
      - name: Install pdoc
        run: python3 -m pip install pdoc==16.0.0 .

      - name: Prepare pdoc templates
        run: ./.github/scripts/pdoc/prepare_templates.sh pdoc_templates

      - name: Patch pdoc
        run: ./.github/scripts/pdoc/patch_pdoc.sh

      # generate HTML pages inside docs/
      - name: Generate docs
        run: pdoc -n -d markdown -t pdoc_templates -o docs ./atex !atex.cli

      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - uses: actions/deploy-pages@v4
