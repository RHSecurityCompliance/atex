<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <!-- avoid HTTP query (and 404) for a missing favicon -->
    <link rel="icon" href="data:,">
    <title>Productization temp</title>
    <style>
        body {
            background: white;
            font-family: sans-serif;
        }
        a, a:visited {
            color: blue;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }

        #notifications {
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            text-align: center;
        }
        /*
        #header, #footer {
            width: 100%;
            border: none;
            overflow: hidden;
        }
        */
        #content {
            padding: 1em;
        }

        #results {
            border-collapse: collapse;
            margin-top: 1em;
            margin-bottom: 1em;
        }
        #results th {
            user-select: none;
        }
        #results th a, th a:visited, th a:hover {
            color: inherit;
            text-decoration: none;
        }

        /* gray: #ccc
         * red: #fcc
         * yellow: #ffc
         * magenta: #fcf
         * teal: #cff
         * blue: #ccf
         * green: #cfc
         */
        #results tr.pass {
            background: #cfc;
        }
        #results tr.fail {
            background: #fcc;
        }
        #results tr.info {
            background: #ccf;
        }
        #results tr.skip {
            background: #ccc;
        }
        #results tr.warn {
            background: #ffc;
        }
        #results tr.error {
            background: #fcc;
        }

        #results td {
            border-right: solid 1px black;
            border-left: solid 1px black;
            border-top: dotted 1px black;
            border-bottom: dotted 1px black;
            width: fit-content;
        }
        #results td.platform {
            text-align: center;
            padding: 0.2em 0.4em;
        }
        #results td.status {
            text-align: center;
            padding: 0.2em 0.2em;
        }
        #results td.test {
            white-space: nowrap;
            padding: 0.2em 1em;
        }
        #results td.sub {
            white-space: nowrap;
            padding: 0.2em 1em;
        }
        #results td.note {
            color: #c00;
            padding: 0.2em 1em;
        }
        #results td.files {
            padding: 0.2em 1em;
            word-spacing: 0.5em;
        }

        #filter {
            margin-top: 1em;
            margin-bottom: 1em;
        }
        #filter span {
            font-family: monospace;
            font-size: 120%;
        }
        #filter_query {
            box-sizing: border-box;
            width: 90%;
            /* top | right | bottom | left */
            padding: 1em 1em 1em 1em;
            resize: both;
            font-family: monospace;
            font-size: 130%;
        }

        #noresults {
            width: 100%;
            text-align: center;
            font-weight: bold;
        }

        #reruns {
            font-size: 30%;
            text-transform: uppercase;
        }
    </style>
    <script defer type="module" src="results.js"></script>
</head>
<body>
    <div id="notifications"></div>
    <div id="content" style="display: none">
        <!-- shown after fetching header/footer by script code -->
        <div id="header" style="display: none"></div>
        <div id="filter">
            <datalist id="query_examples">
                <option value="TRUE">All results</option>
                <option value="status IN ('fail', 'error')">Only fail/error</option>
                <option value="sub IS NULL">Only tests themselves</option>
            </datalist>
            <span>SELECT platform, status, test, sub, note, files FROM results WHERE</span>
            <form id="filter_form">
                <input id="filter_query" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" list="query_examples" placeholder="Enter SQL WHERE condition here ...">
                <button type="submit">Submit</button>
            </form>
            <span>LIMIT 1001;</span>
        </div>
        <table id="results" style="display: none">
            <thead>
                <tr>
                    <th>Platform</th>
                    <th>Status</th>
                    <th>Test</th>
                    <th>Sub</th>
                    <th>Note</th>
                    <th>Files</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div id="noresults" style="display: none">No results to show.</div>
        <div id="old_runs" style="display: none"></div>
        <div id="footer" style="display: none"></div>
    </div>
</body>
</html>
